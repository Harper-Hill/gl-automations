<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f1110;--surface:#161a18;--border:#2a3030;--text:#e8e4dc;--muted:#a8b8ac;--dim:#6b7a6e;--faint:#4a5e50;--green:#3d6b44;--green-lt:#5a9e68;--green-dk:#233028;--green2:#1a3d2b;--red:#c05c4a;--red-dk:#2e1a18;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);--nav-h:60px;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden}
body{display:flex;flex-direction:column}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(10px + var(--safe-top)) 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-img{width:36px;height:36px;object-fit:contain}
.lname{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;line-height:1.2}
.lsub{font-size:9px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.hdr-top{display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;background:var(--green-lt);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hdr-time{font-size:11px;color:var(--dim)}
.hdr-bot{display:flex;align-items:center;gap:6px}
.hdr-label{font-size:9px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--faint);font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:color .15s,border-color .15s}
.refresh-btn:active{color:var(--green-lt);border-color:var(--green)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--nav-h) + var(--safe-bot) + 16px)}
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bot));background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;padding-bottom:var(--safe-bot);z-index:100}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;cursor:pointer;border:none;background:none;color:var(--faint);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;min-height:44px;transition:color .15s}
.bnav-btn.active{color:var(--green-lt)}
.bnav-icon{width:20px;height:20px}
.section{display:none}.section.active{display:block}
.slabel{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin:0 0 12px;font-family:'Syne',sans-serif}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.mcols{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.mlabel{font-size:9px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:3px}
.mval{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--text);line-height:1}
.mval.pos{color:var(--green-lt)}.mval.neg{color:var(--red)}
.msub{font-size:10px;color:var(--dim);margin-top:5px}
.mprev{font-size:10px;color:var(--faint);margin-top:4px;padding-top:8px;border-top:1px solid var(--border)}
.badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;margin-top:6px}
.badge.up{background:#1a2e1e;color:var(--green-lt)}.badge.dn{background:var(--red-dk);color:var(--red)}
.prog{margin-top:8px;background:#1e2420;border-radius:2px;height:3px}
.prog-fill{background:var(--green);height:3px;border-radius:2px;transition:width .6s}
.tip{display:none;position:fixed;background:#1a2a1e;border:1px solid #2a4030;border-radius:6px;padding:8px 10px;font-size:11px;color:var(--muted);line-height:1.5;z-index:9999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:min(240px,80vw)}
.tip.on{display:block}
.info-btn{width:15px;height:15px;border-radius:50%;background:#233028;border:none;color:var(--green-lt);font-size:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;vertical-align:middle;margin-left:2px}
.split{display:grid;grid-template-columns:1fr 1fr}
.split-item{padding:12px 0}
.split-item:first-child{border-right:1px solid var(--border);padding-right:14px}
.split-item:last-child{padding-left:14px}
.split-label{font-size:9px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.split-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.split-sub{font-size:10px;color:var(--dim);margin-top:3px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1e1c;font-size:11px}
.prow:last-child{border:none}
.pname{color:var(--muted);flex:1;padding-right:8px}
.pval{color:var(--text);font-weight:500;white-space:nowrap}
.legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.lline{width:18px;height:2px;background:#5a7a5e;border-radius:1px;position:relative;flex-shrink:0}
.lline::after{content:'';width:6px;height:6px;background:#5a7a5e;border-radius:50%;position:absolute;top:-2px;left:6px}
.chart-wrap{position:relative;width:100%;height:220px;margin-top:4px}
/* Month detail panel */
.month-panel{display:none;background:#111614;border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-top:10px}
.month-panel.on{display:block}
.month-panel-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--green-lt);margin-bottom:8px}
.month-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.month-stat{font-size:11px}
.month-stat-label{color:var(--faint);font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.month-stat-val{color:var(--text);font-weight:500}
/* Sync cards */
.sync-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sync-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:border-color .15s;user-select:none}
.sync-card.open{border-color:var(--green)}
.sync-tag{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.sync-name{font-size:11px;color:var(--green-lt);font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sync-desc{font-size:10px;color:var(--muted);margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sync-date{font-size:10px;color:var(--dim);margin-bottom:4px}
.sync-amt{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.sync-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.sync-detail.on{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.sdrow{font-size:10px;padding:3px 0}
.sdrow-label{color:var(--faint);font-size:9px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1px}
.sdrow-val{color:var(--muted)}
/* Goals */
.goals-list{display:flex;flex-direction:column;gap:8px}
.goal{display:flex;flex-direction:column;gap:6px;padding:12px;background:#111614;border-radius:6px;border:1px solid var(--border)}
.goal-top{display:flex;align-items:flex-start;gap:10px}
.goal-n{width:22px;height:22px;background:var(--green-dk);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--green-lt);font-weight:500;flex-shrink:0;margin-top:1px}
.goal-text{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
.goal-status{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gbadge{font-size:9px;padding:2px 7px;border-radius:3px;white-space:nowrap}
.gbadge.on{background:#1a2e1e;color:var(--green-lt)}.gbadge.off{background:var(--red-dk);color:var(--red)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:12px;color:var(--faint);font-size:12px;letter-spacing:.1em}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:380px){.sync-grid{grid-template-columns:1fr}.month-grid{grid-template-columns:1fr}}
    /* Notifications page */
    .auth-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--green-lt);font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase}
    .auth-btn.signed-out{color:var(--faint)}
    .nf-form{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px}
    .nf-form textarea{width:100%;background:#111614;border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:10px;resize:vertical;min-height:70px;margin-bottom:10px}
    .nf-form textarea:focus{outline:none;border-color:var(--green)}
    .nf-form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .nf-form-row label{display:flex;flex-direction:column;gap:4px;font-size:9px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
    .nf-form-row select,.nf-form-row input{background:#111614;border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:6px 8px}
    .nf-form-row select:focus,.nf-form-row input:focus{outline:none;border-color:var(--green)}
    .nf-submit{background:var(--green);border:none;border-radius:4px;color:#fff;font-family:'DM Mono',monospace;font-size:11px;padding:8px 14px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase}
    .nf-submit:disabled{background:var(--faint);cursor:not-allowed}
    .nf-submit:active:not(:disabled){background:var(--green-lt)}
    .nf-msg{font-size:10px;color:var(--green-lt);margin-top:8px;display:none}
    .nf-msg.err{color:var(--red)}
    .nf-msg.on{display:block}
    .nf-toggle{display:flex;background:#1e2420;border-radius:6px;padding:2px;gap:2px;margin-bottom:12px;width:fit-content}
    .nf-toggle button{font-family:'DM Mono',monospace;font-size:10px;padding:4px 12px;border:none;border-radius:4px;cursor:pointer;background:transparent;color:var(--faint);transition:all .15s}
    .nf-toggle button.active{background:var(--green);color:#fff}
    .nf-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:11px}
    .nf-row.expired{opacity:.4}
    .nf-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
    .nf-row-meta{font-size:9px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase}
    .nf-row-content{color:var(--text);line-height:1.45;margin-bottom:8px;white-space:pre-wrap;word-break:break-word}
    .nf-row-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
    .nf-tag{font-size:9px;padding:2px 6px;border-radius:3px;background:#1a2e1e;color:var(--green-lt);letter-spacing:.05em}
    .nf-tag.high{background:var(--red-dk);color:var(--red)}
    .nf-tag.muted{background:#1e2420;color:var(--dim)}
    .nf-row-audit{font-size:10px;color:var(--dim);display:flex;flex-wrap:wrap;gap:8px}
    .nf-row-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
    .nf-row-actions button{background:none;border:1px solid var(--border);border-radius:4px;color:var(--faint);font-family:'DM Mono',monospace;font-size:9px;padding:4px 8px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase}
    .nf-row-actions button:hover{color:var(--text)}
    .nf-row-actions button.danger{color:var(--red);border-color:#3a1e1c}
    .nf-empty{padding:24px;text-align:center;color:var(--faint);font-size:11px}
    .nf-gate{padding:16px;text-align:center;background:var(--surface);border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-size:11px;line-height:1.6}
</style>
</head>

      <svg class="bnav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l2.5 2.5"/><path d="M3 4l3 3M17 4l-3 3"/></svg>

    </button>
    <button class="bnav-btn" id="btn-notifs" onclick="switchTab('notifs')">
      <svg class="bnav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 8a5 5 0 0 1 10 0v4l1.5 2H3.5L5 12V8z"/><path d="M8 16a2 2 0 0 0 4 0"/></svg>
      Notify
    </button>
  </nav>
<script>
const fmt=v=>'£'+Math.abs(v).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtF=v=>(v<0?'−':'')+'£'+Math.abs(v).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
let revChart=null, _dashData=null;
const gtip=document.getElementById('gtip');
function showTip(btn,txt){
  gtip.textContent=txt;gtip.classList.add('on');
  requestAnimationFrame(()=>{
    const r=btn.getBoundingClientRect(),th=gtip.offsetHeight,tw=gtip.offsetWidth;
    let left=r.left+r.width/2-tw/2;
    left=Math.max(8,Math.min(left,window.innerWidth-tw-8));
    let top=r.top-th-6;if(top<8)top=r.bottom+6;
    gtip.style.left=left+'px';gtip.style.top=top+'px';
  });
}
function hideTip(){gtip.classList.remove('on');}
document.addEventListener('click',e=>{if(!e.target.classList.contains('info-btn'))hideTip();});
function ib(txt){const s=txt.replace(/'/g,"\\'").replace(/"/g,'&quot;');return '<button class="info-btn" onclick="event.stopPropagation();showTip(this,\''+s+'\')">i</button>';}
function switchTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  document.getElementById('btn-'+tab).classList.add('active');
  hideTip();if(revChart)revChart.resize();
}
function fmtDate(iso){if(!iso||iso==='undefined'||iso==='')return '—';try{return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return iso;}}

function toggleCard(id){
  const detail=document.getElementById(id);
  const card=detail.closest('.sync-card');
  const isOpen=detail.classList.contains('on');
  detail.classList.toggle('on',!isOpen);
  card.classList.toggle('open',!isOpen);
}

function renderOverview(d){
  _dashData=d;
  const rev=d.revenue;
  const now=new Date(),curM=now.getMonth();
  const mn=now.toLocaleString('en-GB',{month:'short'});
  const ytd25sp=rev.monthly2025.slice(0,curM+1).reduce((s,m)=>s+(m.value||0),0);
  const prog=Math.min(Math.round((rev.ytd2026/160000)*100),100);
  const gpm=rev.ytd2026>0?((d.grossProfit.ytd2026/rev.ytd2026)*100).toFixed(1):'0.0';
  const gpm25=ytd25sp>0?((d.grossProfit.ytd2025/ytd25sp)*100).toFixed(1):'0.0';
  const npPos=d.netProfit.ytd2026>=0;
  const domP=rev.ytd2026>0?((d.domestic.ytd/rev.ytd2026)*100).toFixed(1):'0';
  const comP=rev.ytd2026>0?((d.commercial.ytd/rev.ytd2026)*100).toFixed(1):'0';
  const inv=d.lastInvoice, exp=d.lastExpense;

  document.getElementById('overview-content').innerHTML=`
    <div class="slabel">Year to date — 2026</div>
    <div class="mcols">
      <div class="metric">
        <div class="mlabel">Total Revenue ${ib('All money received from clients for jobs and services completed')}</div>
        <div class="mval">${fmt(rev.ytd2026)}</div>
        <div class="prog"><div class="prog-fill" style="width:${prog}%"></div></div>
        <div class="msub">${prog}% of £160k annual target</div>
        <div class="mprev">Jan–${mn} 2025: <strong>${fmt(ytd25sp)}</strong></div>
      </div>
      <div class="metric">
        <div class="mlabel">Gross Profit ${ib('Revenue minus direct costs of doing the work, before overheads')}</div>
        <div class="mval pos">${fmtF(d.grossProfit.ytd2026)}</div>
        <div class="badge up">${gpm}% margin</div>
        <div class="mprev">Jan–${mn} 2025: <strong>${fmtF(d.grossProfit.ytd2025)}</strong> &middot; ${gpm25}% margin</div>
      </div>
      <div class="metric" style="border-color:#2a4a6b;background:#0d1a24">
        <div class="mlabel" style="color:#6a9abf">Net Profit ${ib('What the business keeps after paying ALL costs')}</div>
        <div class="mval" style="color:${npPos?'#4a8abf':'var(--red)'}">${fmtF(d.netProfit.ytd2026)}</div>
        <div class="badge ${npPos?'up':'dn'}" style="${npPos?'background:#0d2a3d;color:#4a8abf':''}">${npPos?'profit':'loss'}</div>
        <div class="mprev">Jan–${mn} 2025: <strong>${fmtF(d.netProfit.ytd2025)}</strong></div>
      </div>
    </div>
    <div class="card">
      <div class="slabel">Monthly Revenue — Domestic &amp; Commercial</div>
      <div class="legend">
        <div class="legend-item"><div class="ldot" style="background:#3d6b44"></div>Dom 2026</div>
        <div class="legend-item"><div class="ldot" style="background:#1a3d2b"></div>Com 2026</div>
        <div class="legend-item"><div class="lline"></div>2025</div>
        <div class="legend-item"><div style="width:18px;height:2px;background:#4a8abf;border-radius:1px;border-top:2px dashed #4a8abf"></div>Net P&L</div>
      </div>
      <div class="chart-wrap"><canvas id="revChart"></canvas></div>
      <div class="month-panel" id="month-panel">
        <div class="month-panel-title" id="month-panel-title"></div>
        <div class="month-grid" id="month-panel-body"></div>
      </div>
    </div>
    <div class="card">
      <div class="slabel">Revenue split YTD</div>
      <div class="split">
        <div class="split-item"><div class="split-label">Domestic</div><div class="split-val">${fmt(d.domestic.ytd)}</div><div class="split-sub">${domP}% of total</div></div>
        <div class="split-item"><div class="split-label">Commercial</div><div class="split-val">${fmt(d.commercial.ytd)}</div><div class="split-sub">${comP}% of total</div></div>
      </div>
    </div>
    <div class="card" id="hours-card-placeholder"></div>
    <div class="sync-grid">
      <div class="sync-card" onclick="toggleCard('inv-detail')">
        <div class="sync-tag">Last Invoice</div>
        ${inv?`
          <div class="sync-name">${inv.client||'—'}</div>
          <div class="sync-desc">${inv.description||'—'}</div>
          <div class="sync-date">${fmtDate(inv.date)}</div>
          <div class="sync-amt">${fmt(inv.amount)}</div>
          <div class="sync-detail" id="inv-detail">
            <div class="sdrow"><div class="sdrow-label">VAT</div><div class="sdrow-val">${inv.vat!=null?fmt(inv.vat):'—'}</div></div>
            <div class="sdrow"><div class="sdrow-label">Property</div><div class="sdrow-val">${inv.propertyType||'—'}</div></div>
            <div class="sdrow"><div class="sdrow-label">Date paid</div><div class="sdrow-val">${fmtDate(inv.datePaid)}</div></div>
            <div class="sdrow" style="grid-column:1/-1"><div class="sdrow-label">Notes</div><div class="sdrow-val">${inv.notes||'—'}</div></div>
          </div>`
        :'<div style="font-size:10px;color:var(--faint)">No data yet</div>'}
      </div>
      <div class="sync-card" onclick="toggleCard('exp-detail')">
        <div class="sync-tag">Last Expense</div>
        ${exp?`
          <div class="sync-name">${exp.supplier||'—'}</div>
          <div class="sync-desc">${exp.description||'—'}</div>
          <div class="sync-date">${fmtDate(exp.date)}</div>
          <div class="sync-amt">${fmt(exp.amount)}</div>
          <div class="sync-detail" id="exp-detail">
            <div class="sdrow"><div class="sdrow-label">Category</div><div class="sdrow-val">${exp.category||'—'}</div></div>
            <div class="sdrow"><div class="sdrow-label">Tax type</div><div class="sdrow-val">${exp.taxType||'—'}</div></div>
            <div class="sdrow"><div class="sdrow-label">VAT</div><div class="sdrow-val">${exp.vat!=null?fmt(exp.vat):'—'}</div></div>
            <div class="sdrow" style="grid-column:1/-1"><div class="sdrow-label">Notes</div><div class="sdrow-val">${exp.notes||'—'}</div></div>

    </div>`;

  // Build chart
  const months=rev.monthly2026.map(m=>m.month);
  const domData=(rev.monthlyDom||[]).map(m=>m.value||0);
  const comData=(rev.monthlyCom||[]).map(m=>m.value||0);
  const prev25=rev.monthly2025.map(m=>m.value||0);
  const np26m=(function(){
    const vals=(rev.monthlyNP||[]).map(m=>m.value||0);
    let cum=0;
    return vals.map(v=>{ cum+=v; return Math.round(cum*100)/100; });
  })();

  if(revChart)revChart.destroy();
  revChart=new Chart(document.getElementById('revChart'),{
    type:'bar',
    data:{labels:months,datasets:[
      {type:'bar',label:'Dom 2026',data:domData,backgroundColor:'#3d6b44',borderRadius:2,stack:'s',order:2},
      {type:'bar',label:'Com 2026',data:comData,backgroundColor:'#1a3d2b',borderRadius:0,stack:'s',order:2},
      {type:'line',label:'2025',data:prev25,borderColor:'#5a7a5e',backgroundColor:'transparent',pointBackgroundColor:'#5a7a5e',pointRadius:3,pointHoverRadius:5,borderWidth:2,tension:0.3,fill:false,order:1},
      {type:'line',label:'Net P&L (cum)',data:np26m,borderColor:'#4a8abf',backgroundColor:'transparent',pointBackgroundColor:'#4a8abf',pointRadius:2,pointHoverRadius:4,borderWidth:1.5,tension:0.3,fill:false,order:1,borderDash:[4,3],yAxisID:'y2'}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,

        if(!els.length){document.getElementById('month-panel').classList.remove('on');return;}
        const idx=els[0].index;
        const mLabel=months[idx];
        const mRev=(domData[idx]||0)+(comData[idx]||0);
        const mRevCum=domData.slice(0,idx+1).reduce((s,v)=>s+v,0)+comData.slice(0,idx+1).reduce((s,v)=>s+v,0);
        // Get cumulative GP and NP from monthly data (approximate from total fractions)
        const revFrac=_dashData.revenue.ytd2026>0?mRevCum/_dashData.revenue.ytd2026:0;
        const gpCum=_dashData.grossProfit.ytd2026*revFrac;
        const npCum=_dashData.netProfit.ytd2026*revFrac;
        document.getElementById('month-panel-title').textContent=mLabel+' 2026';
        document.getElementById('month-panel-body').innerHTML=`
          <div class="month-stat"><div class="month-stat-label">Month revenue</div><div class="month-stat-val">${fmt(mRev)}</div></div>
          <div class="month-stat"><div class="month-stat-label">Revenue to ${mLabel}</div><div class="month-stat-val">${fmt(mRevCum)}</div></div>
          <div class="month-stat"><div class="month-stat-label">Gross profit to ${mLabel}</div><div class="month-stat-val" style="color:var(--green-lt)">${fmtF(gpCum)}</div></div>
          <div class="month-stat"><div class="month-stat-label">Net profit to ${mLabel}</div><div class="month-stat-val" style="color:${npCum>=0?'var(--green-lt)':'var(--red)'}">${fmtF(npCum)}</div></div>`;
        document.getElementById('month-panel').classList.add('on');
      },
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>ctx.dataset.label==='Net P&L (cum)'?' Net P&L (cum): '+(ctx.parsed.y<0?'−':'')+'£'+(Math.abs(ctx.parsed.y)/1000).toFixed(1)+'k':' '+ctx.dataset.label+': £'+(ctx.parsed.y/1000).toFixed(1)+'k'}}},
      scales:{
        x:{stacked:true,ticks:{color:'#4a5e50',font:{size:9,family:'DM Mono'},autoSkip:false,maxRotation:0},grid:{color:'#1e2420'}},
        y:{stacked:true,ticks:{color:'#4a5e50',font:{size:9,family:'DM Mono'},callback:v=>'£'+(v/1000).toFixed(0)+'k'},grid:{color:'#1e2420'}},
        y2:{position:'right',ticks:{color:'#4a8abf',font:{size:9,family:'DM Mono'},callback:v=>'£'+(v/1000).toFixed(0)+'k'},grid:{display:false}}
      }
    }
  });
}

function renderExpenses(d){
  const exp=d.expenses;
  const colors=['#3d6b44','#1a3d2b','#2a5c38','#4a8a54','#5aa060','#6b8f70','#2a3a2e','#1e2e22','#3a5040','#4a6050'];
  const sorted=[...exp.breakdown].filter(e=>e.value>0).sort((a,b)=>b.value-a.value);
  const allItems=[...exp.breakdown].sort((a,b)=>b.value-a.value);
  document.getElementById('expenses-content').innerHTML=`
    <div class="slabel">Where the money goes</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="metric"><div class="mlabel">Total Expenses ${ib('Everything the business spends — direct costs plus overheads')}</div><div class="mval neg">${fmt(exp.total)}</div><div class="msub">YTD 2026</div></div>
      <div class="metric"><div class="mlabel">Cost of Sales ${ib('Costs directly tied to completing jobs — labour, materials, VAT')}</div><div class="mval">${fmt(exp.costOfSales)}</div><div class="msub">${exp.total>0?((exp.costOfSales/exp.total)*100).toFixed(0):0}% of spend</div></div>
    </div>
    <div class="card">
      <div class="slabel">Breakdown by type</div>

      <div style="display:flex;flex-direction:column;gap:6px">
        ${allItems.map((e,i)=>`
          <div style="display:flex;align-items:center;gap:8px;font-size:11px">
            <div style="width:10px;height:10px;border-radius:2px;flex-shrink:0;background:${colors[i%10]}"></div>
            <span style="flex:1;color:var(--muted)">${e.label} ${ib(e.info)}</span>
            <span style="color:var(--dim);min-width:54px;text-align:right">${fmt(e.value)}</span>

  if(sorted.length>0){
    new Chart(document.getElementById('pieChart'),{
      type:'doughnut',
      data:{
        labels:sorted.map(e=>e.label),

      },
      options:{
        responsive:true,maintainAspectRatio:true,cutout:'58%',

function renderHours(d){
  if(!d.hours){
    document.getElementById('hours-content').innerHTML='<div class="loading" style="color:var(--faint)">No hours data yet</div>';
    return;
  }
  const h=d.hours;
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function pctFmt(v){return typeof v==='number'?(v*100).toFixed(1)+'%':'—';}
  function hoursCard(label, data, color){
    const avg=data.billablePct.average;
    const goal=data.billablePct.goal;
    const avgPct=typeof avg==='number'?avg*100:0;
    const goalPct=typeof goal==='number'?goal*100:0;
    const onTarget=avgPct>=goalPct;
    const prog=Math.min(Math.round((avgPct/Math.max(goalPct,1))*100),100);
    const monthlyData=data.billablePct.monthly.map(m=>typeof m.value==='number'?+(m.value*100).toFixed(1):0);
    const canvasId='hchart-'+label.replace(/\s/g,'-');
    return `<div class="card" style="margin-bottom:12px">
      <div class="slabel">${label} — Billable Hours %</div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:${onTarget?'var(--green-lt)':'var(--red)'};line-height:1">${avgPct.toFixed(1)}%</div>
          <div style="font-size:10px;color:var(--dim);margin-top:4px">YTD average</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--faint)">Goal</div>
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--faint)">${goalPct.toFixed(0)}%</div>
        </div>
      </div>
      <div style="background:#1e2420;border-radius:3px;height:6px;margin-bottom:6px;position:relative">
        <div style="background:${onTarget?'var(--green)':'var(--red)'};height:6px;border-radius:3px;width:${Math.min(avgPct,goalPct>0?goalPct:100)/Math.max(goalPct,100)*100}%;max-width:100%;transition:width .6s"></div>
        ${goalPct>0?`<div style="position:absolute;top:-3px;left:${Math.min(goalPct,100)}%;width:2px;height:12px;background:var(--faint);border-radius:1px;transform:translateX(-50%)"></div>`:''}
      </div>
      <div style="font-size:10px;color:${onTarget?'var(--green-lt)':'var(--red)'};margin-bottom:12px">
        ${onTarget?'↑ On target':'↓ Below target'} &middot; ${Math.abs(avgPct-goalPct).toFixed(1)}% ${onTarget?'above':'below'} goal
      </div>
      <div class="chart-wrap" style="height:140px"><canvas id="${canvasId}"></canvas></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px">
        <div style="font-size:10px"><div style="color:var(--faint);font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">Clocked</div><div style="color:var(--text)">${typeof data.totalClocked.total==='number'?data.totalClocked.total.toFixed(1)+'h':'—'}</div></div>
        <div style="font-size:10px"><div style="color:var(--faint);font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">Billable</div><div style="color:var(--green-lt)">${typeof data.totalBillable.total==='number'?data.totalBillable.total.toFixed(1)+'h':'—'}</div></div>
        <div style="font-size:10px"><div style="color:var(--faint);font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">Admin</div><div style="color:var(--dim)">${typeof data.adminHours.total==='number'?data.adminHours.total.toFixed(1)+'h':'—'}</div></div>
      </div>
      <script>
      (function(){
        var ctx=document.getElementById('${canvasId}');
        if(!ctx)return;
        new Chart(ctx,{
          type:'bar',
          data:{labels:${JSON.stringify(months)},datasets:[
            {data:${JSON.stringify(monthlyData)},backgroundColor:monthlyData.map(v=>v>=${goalPct}?'${color}':'#c05c4a'),borderRadius:2}
          ]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y.toFixed(1)+'%'}}},
            scales:{
              x:{ticks:{color:'#4a5e50',font:{size:9,family:'DM Mono'},maxRotation:0},grid:{color:'#1e2420'}},
              y:{ticks:{color:'#4a5e50',font:{size:9,family:'DM Mono'},callback:v=>v+'%'},grid:{color:'#1e2420'},
                suggestedMax:Math.max(${goalPct+10},Math.max(...${JSON.stringify(monthlyData)})+5)}
            }
          }
        });
      })();
      <\/script>
    </div>`;
  }

  document.getElementById('hours-content').innerHTML=`
    <div class="slabel">Operational Hours — 2026</div>
    ${hoursCard('Staff Hours', h.staff, '#3d6b44')}
    ${hoursCard('Director Hours', h.director, '#1a3d2b')}
    ${hoursCard('All Hours', h.all, '#2a5c38')}
  `;

  // Also update the overview hours card
  const hCard=document.getElementById('hours-card-placeholder');
  if(hCard&&h.staff){
    const avg=h.staff.billablePct.average;
    const goal=h.staff.billablePct.goal;
    const avgPct=typeof avg==='number'?avg*100:0;
    const goalPct=typeof goal==='number'?goal*100:0;
    const onTarget=avgPct>=goalPct;
    hCard.innerHTML=`
      <div class="slabel">Staff Billable Hours % ${ib('Percentage of staff hours logged against billable client jobs (target: '+goalPct.toFixed(0)+'%)')}</div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px">
        <div><div class="mval ${onTarget?'pos':'neg'}">${avgPct.toFixed(1)}%</div><div style="font-size:10px;color:var(--dim);margin-top:4px">YTD average</div></div>
        <div style="text-align:right"><div style="font-size:10px;color:var(--faint)">Goal</div><div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--faint)">${goalPct.toFixed(0)}%</div></div>
      </div>
      <div style="background:#1e2420;border-radius:3px;height:5px;margin-bottom:6px;position:relative">
        <div style="background:${onTarget?'var(--green)':'var(--red)'};height:5px;border-radius:3px;width:${Math.min((avgPct/Math.max(goalPct,1))*100,100)}%;transition:width .6s"></div>
        <div style="position:absolute;top:-3px;left:${Math.min(goalPct,100)}%;width:2px;height:11px;background:var(--faint);border-radius:1px;transform:translateX(-50%)"></div>
      </div>
      <div style="font-size:10px;color:${onTarget?'var(--green-lt)':'var(--red)'}">
        ${onTarget?'↑ On target':'↓ Below target'} &middot; ${Math.abs(avgPct-goalPct).toFixed(1)}% ${onTarget?'above':'below'} ${goalPct.toFixed(0)}% goal
      </div>`;
  }
}

function renderGoals(d){
  const now=new Date();
  const dayOfYear=Math.floor((now-new Date(now.getFullYear(),0,0))/(1000*60*60*24));
  const expectedRev=Math.round((dayOfYear/365)*160000);
  const actualRev=d.revenue.ytd2026;
  const revDiff=actualRev-expectedRev;
  const onTarget=revDiff>=0;
  const prog=Math.min(Math.round((actualRev/160000)*100),100);
  const goals=d.goals.length?d.goals:['Reduce debt down to zero','Achieve tax profitability','Reduce broken machine % to 0%','Achieve revenue forecast of £160,000'];

  function goalStatus(txt){
    if(txt.toLowerCase().includes('160')||txt.toLowerCase().includes('revenue forecast')){
      const badge=`<span class="gbadge ${onTarget?'on':'off'}">${onTarget?'↑ On target':'Behind target'}</span>`;
      const detail=`<span style="font-size:10px;color:var(--dim)">${fmt(Math.abs(revDiff))} ${onTarget?'ahead of':'behind'} schedule (expected ${fmt(expectedRev)} by today)</span>`;
      return `<div class="goal-status">${badge}${detail}</div>`;
    }
    return '';
  }

  document.getElementById('goals-content').innerHTML=`
    <div class="slabel">2026 Annual Goals</div>
    <div class="goals-list">
      ${goals.map((g,i)=>{
        const txt=g.replace(/^\d+\.\s*/,'');
        return `<div class="goal">
          <div class="goal-top"><div class="goal-n">${i+1}</div><div class="goal-text">${txt}</div></div>
          ${goalStatus(txt)}
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:16px">
      <div class="slabel">Revenue Goal Progress</div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;color:var(--muted)">£160,000 target</span>
          <span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--green-lt)">${fmt(actualRev)}</span>
        </div>
        <div style="position:relative;background:#1e2420;border-radius:3px;height:6px;margin-bottom:8px">
          <div style="background:var(--green);height:6px;border-radius:3px;width:${prog}%;transition:width .6s"></div>
          <div style="position:absolute;top:-3px;left:${Math.min((expectedRev/160000)*100,100).toFixed(1)}%;width:2px;height:12px;background:var(--faint);border-radius:1px;transform:translateX(-50%)"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dim)">
          <span>${prog}% achieved</span>
          <span style="color:var(--faint)">▾ expected ${Math.round((expectedRev/160000)*100)}%</span>
        </div>
        <div style="font-size:10px;margin-top:6px;color:${onTarget?'var(--green-lt)':'var(--red)'}">
          ${onTarget?'↑':'↓'} ${fmt(Math.abs(revDiff))} ${onTarget?'ahead of':'behind'} schedule
        </div>
      </div>
    </div>`;
}

// ── NETLIFY IDENTITY ───────────────────────────────────────────
let _user=null, _showAllNotifs=false, _notifsCache=null;
function isDirector(u){return u && u.app_metadata && (u.app_metadata.roles||[]).indexOf('director')!==-1;}
async function authHeaders(){
  if(!_user || !_user.token || !_user.token.refresh_token) return {};
  // ALWAYS refresh — no cache check
  try {
    const r = await fetch('/.netlify/identity/token', {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'grant_type=refresh_token&refresh_token='+encodeURIComponent(_user.token.refresh_token)
    });
    if(!r.ok){
      const txt = await r.text();
      console.error('Refresh failed:', r.status, txt);
      return {};
    }
    const j = await r.json();
    _user.token = {
      access_token: j.access_token,
      refresh_token: j.refresh_token || _user.token.refresh_token,
      expires_in: j.expires_in,
      token_type: j.token_type,
      expires_at: Date.now() + (j.expires_in * 1000)
    };
    return {'Authorization':'Bearer '+j.access_token};
  } catch(e) {
    console.error('Refresh error:', e);
    return {};
  }
}
function updateAuthUI(){
  const btn=document.getElementById('auth-btn');
  if(_user){btn.textContent=_user.user_metadata&&_user.user_metadata.full_name?_user.user_metadata.full_name.split(' ')[0]:'Sign out';btn.classList.remove('signed-out');}
  else{btn.textContent='Sign in';btn.classList.add('signed-out');}
}
function handleAuth(){
  if(_user){
    if(confirm('Sign out?')) window.netlifyIdentity.logout();
  } else window.netlifyIdentity.open();
}
if(window.netlifyIdentity){
  netlifyIdentity.on('init', user=>{_user=user;updateAuthUI();});
  netlifyIdentity.on('login', user=>{_user=user;updateAuthUI();netlifyIdentity.close();if(document.getElementById('btn-notifs').classList.contains('active'))loadNotifs();});
  netlifyIdentity.on('logout', ()=>{_user=null;updateAuthUI();if(document.getElementById('btn-notifs').classList.contains('active'))renderNotifs(_notifsCache);});
}

// ── NOTIFICATIONS ──────────────────────────────────────────────
async function loadNotifs(){
  const c=document.getElementById('notifs-content');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
  try{
    const url='/.netlify/functions/staff-notifications'+(_showAllNotifs?'?showAll=1':'');
    const res=await fetch(url);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    _notifsCache=data;
    renderNotifs(data);
  }catch(e){
    c.innerHTML='<div class="loading" style="color:var(--red)">Error: '+e.message+'</div>';
  }
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtNotifDate(s){if(!s)return '—';try{const d=new Date(s);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}catch(e){return s;}}

function renderNotifs(data){
  const c=document.getElementById('notifs-content');
  const dir=isDirector(_user);
  const signedIn=!!_user;
  const items=(data&&data.items)||[];
  let html='<div class="slabel">Staff Notifications</div>';

  // Form (sign-in gated)
  if(signedIn){
    html+=`<div class="nf-form">
      <textarea id="nf-content" placeholder="Notification text — what should staff know?"></textarea>
      <div class="nf-form-row">
        <label>Audience<select id="nf-audience"><option value="all">All staff</option><option value="Laure Jeanjean">Laure Jeanjean</option><option value="Alex Honnor">Alex Honnor</option><option value="Sam Barton">Sam Barton</option><option value="Nadia Beeley">Nadia Beeley</option></select></label>
        <label>Priority<select id="nf-priority"><option value="normal">Normal</option><option value="high">High</option></select></label>
      </div>
      <div class="nf-form-row">
        <label>Expires (optional)<input type="date" id="nf-expires"></label>
        <label style="visibility:hidden">spacer<input type="text"></label>
      </div>
      <button class="nf-submit" id="nf-submit" onclick="submitNotif()">Add Notification</button>
      <div class="nf-msg" id="nf-msg"></div>
    </div>`;
  } else {
    html+='<div class="nf-gate">Sign in (top right) to add a notification.</div>';
  }

  // Toggle
  html+=`<div class="nf-toggle">
    <button class="${_showAllNotifs?'':'active'}" onclick="setNotifsRange(false)">Last 30 days</button>
    <button class="${_showAllNotifs?'active':''}" onclick="setNotifsRange(true)">Show older</button>
  </div>`;

  // List
  if(items.length===0){
    html+='<div class="nf-empty">No notifications.</div>';
  } else {
    items.forEach(it=>{
      const isExpired=String(it.status||'').toLowerCase()==='expired';
      const audienceLabel=it.audience==='all'?'All staff':escHtml(it.audience);
      const sourceLabel=it.source==='asset_tracker'?'Maintenance':it.source==='dashboard_metrics'?'Metrics':'Manual';
      const priorityTag=it.priority==='high'?'<span class="nf-tag high">High priority</span>':'';
      const sourceTag=`<span class="nf-tag muted">${sourceLabel}</span>`;
      const audienceTag=`<span class="nf-tag muted">${audienceLabel}</span>`;
      const expiresTag=it.expires?`<span class="nf-tag muted">Expires ${escHtml(it.expires)}</span>`:'';
      const expiredTag=isExpired?'<span class="nf-tag muted">Expired</span>':'';
      const audit=it.delivered.length>0
        ? `<div class="nf-row-audit">Delivered to ${it.delivered.length}: ${escHtml(it.delivered.join(', '))} &middot; Read by ${it.read.length}</div>`
        : '<div class="nf-row-audit" style="color:var(--faint)">Pending — not yet delivered</div>';
      const actions=dir&&!isExpired
        ? `<div class="nf-row-actions">
            <button onclick="editNotif('${it.id}',${it.rowIndex})">Edit</button>
            <button class="danger" onclick="deleteNotif('${it.id}',${it.rowIndex})">Delete</button>
          </div>` : '';
      html+=`<div class="nf-row${isExpired?' expired':''}">
        <div class="nf-row-top">
          <div class="nf-row-meta">${fmtNotifDate(it.created)}</div>
        </div>
        <div class="nf-row-content">${escHtml(it.content)}</div>
        <div class="nf-row-tags">${priorityTag}${sourceTag}${audienceTag}${expiresTag}${expiredTag}</div>
        ${audit}
        ${actions}
      </div>`;
    });
  }

  c.innerHTML=html;
}

function setNotifsRange(showAll){_showAllNotifs=showAll;loadNotifs();}

async function submitNotif(){
  const content=document.getElementById('nf-content').value.trim();
  const audience=document.getElementById('nf-audience').value;
  const priority=document.getElementById('nf-priority').value;
  const expires=document.getElementById('nf-expires').value;
  const msg=document.getElementById('nf-msg');
  const btn=document.getElementById('nf-submit');
  if(!content){msg.textContent='Content required.';msg.className='nf-msg err on';return;}
  btn.disabled=true;msg.className='nf-msg';
  try{
    const res=await fetch('/.netlify/functions/staff-notifications',{
      method:'POST',
      headers:Object.assign({'Content-Type':'application/json'},await authHeaders()),
      body:JSON.stringify({content,audience,priority,expires})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    msg.textContent='Added.';msg.className='nf-msg on';
    document.getElementById('nf-content').value='';
    document.getElementById('nf-expires').value='';
    document.getElementById('nf-priority').value='normal';
    document.getElementById('nf-audience').value='all';
    setTimeout(()=>{msg.classList.remove('on');loadNotifs();},800);
  }catch(e){
    msg.textContent='Error: '+e.message;msg.className='nf-msg err on';
  }finally{
    btn.disabled=false;
  }
}

async function deleteNotif(id,rowIndex){
  if(!confirm('Mark this notification as expired? It will stop appearing in briefings but the row stays in the sheet.'))return;
  try{
    const res=await fetch('/.netlify/functions/staff-notifications',{
      method:'DELETE',
      headers:Object.assign({'Content-Type':'application/json'},await authHeaders()),
      body:JSON.stringify({id,rowIndex})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    loadNotifs();
  }catch(e){alert('Error: '+e.message);}
}

async function editNotif(id,rowIndex){
  const item=(_notifsCache.items||[]).find(i=>i.id===id);
  if(!item){alert('Notification not found — refresh.');return;}
  const newContent=prompt('Edit content:', item.content);
  if(newContent===null)return;
  try{
    const res=await fetch('/.netlify/functions/staff-notifications',{
      method:'PATCH',
      headers:Object.assign({'Content-Type':'application/json'},await authHeaders()),
      body:JSON.stringify({id,rowIndex,content:newContent})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    loadNotifs();
  }catch(e){alert('Error: '+e.message);}
}

// Wire up: load notifications when the tab is opened
const _origSwitchTab=switchTab;
window.switchTab=function(tab){
  _origSwitchTab(tab);
  if(tab==='notifs')loadNotifs();
};
</script>
