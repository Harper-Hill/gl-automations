<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f1110;--surface:#161a18;--border:#2a3030;--text:#e8e4dc;--muted:#a8b8ac;--dim:#6b7a6e;--faint:#4a5e50;--green:#3d6b44;--green-lt:#5a9e68;--green-dk:#233028;--green2:#1a3d2b;--red:#c05c4a;--red-dk:#2e1a18;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);--nav-h:60px;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden}
body{display:flex;flex-direction:column}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(10px + var(--safe-top)) 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-img{width:36px;height:36px;object-fit:contain}
.lname{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;line-height:1.2}
.lsub{font-size:9px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.hdr-top{display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;background:var(--green-lt);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hdr-time{font-size:11px;color:var(--dim)}
.hdr-bot{display:flex;align-items:center;gap:6px}
.hdr-label{font-size:9px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--faint);font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:color .15s,border-color .15s}
.refresh-btn:active{color:var(--green-lt);border-color:var(--green)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--nav-h) + var(--safe-bot) + 16px)}
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bot));background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;padding-bottom:var(--safe-bot);z-index:100}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;cursor:pointer;border:none;background:none;color:var(--faint);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;min-height:44px;transition:color .15s}
.bnav-btn.active{color:var(--green-lt)}
.bnav-icon{width:20px;height:20px}
.section{display:none}.section.active{display:block}
.slabel{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin:0 0 12px;font-family:'Syne',sans-serif}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.mcols{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.mlabel{font-size:9px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:3px}
.mval{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--text);line-height:1}
.mval.pos{color:var(--green-lt)}.mval.neg{color:var(--red)}
.msub{font-size:10px;color:var(--dim);margin-top:5px}
.mprev{font-size:10px;color:var(--faint);margin-top:4px;padding-top:8px;border-top:1px solid var(--border)}
.badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;margin-top:6px}
.badge.up{background:#1a2e1e;color:var(--green-lt)}.badge.dn{background:var(--red-dk);color:var(--red)}
.prog{margin-top:8px;background:#1e2420;border-radius:2px;height:3px}
.prog-fill{background:var(--green);height:3px;border-radius:2px;transition:width .6s}
.tip{display:none;position:fixed;background:#1a2a1e;border:1px solid #2a4030;border-radius:6px;padding:8px 10px;font-size:11px;color:var(--muted);line-height:1.5;z-index:9999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:min(240px,80vw)}
.tip.on{display:block}
.info-btn{width:15px;height:15px;border-radius:50%;background:#233028;border:none;color:var(--green-lt);font-size:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;vertical-align:middle;margin-left:2px}
.split{display:grid;grid-template-columns:1fr 1fr}
.split-item{padding:12px 0}
.split-item:first-child{border-right:1px solid var(--border);padding-right:14px}
.split-item:last-child{padding-left:14px}
.split-label{font-size:9px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.split-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.split-sub{font-size:10px;color:var(--dim);margin-top:3px}
.exp-bar{margin-bottom:7px}
.exp-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.exp-label{font-size:11px;color:var(--muted);flex:1;display:flex;align-items:center}
.exp-pct{font-size:11px;color:var(--text);font-weight:500;min-width:34px;text-align:right}
.exp-val{font-size:10px;color:var(--dim);min-width:54px;text-align:right}
.exp-track{background:#1e2420;border-radius:2px;height:3px}
.exp-fill{background:var(--green);height:3px;border-radius:2px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1e1c;font-size:11px}
.prow:last-child{border:none}
.pname{color:var(--muted);flex:1;padding-right:8px}
.pval{color:var(--text);font-weight:500;white-space:nowrap}
.legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.lline{width:18px;height:2px;background:#5a7a5e;border-radius:1px;position:relative;flex-shrink:0}
.lline::after{content:'';width:6px;height:6px;background:#5a7a5e;border-radius:50%;position:absolute;top:-2px;left:6px}
.chart-wrap{position:relative;width:100%;height:220px;margin-top:4px}
.goals-list{display:flex;flex-direction:column;gap:8px}
.goal{display:flex;flex-direction:column;gap:6px;padding:12px;background:#111614;border-radius:6px;border:1px solid var(--border)}
.goal-top{display:flex;align-items:flex-start;gap:10px}
.goal-n{width:22px;height:22px;background:var(--green-dk);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--green-lt);font-weight:500;flex-shrink:0;margin-top:1px}
.goal-text{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
.goal-status{display:flex;align-items:center;gap:8px;margin-top:2px}
.goal-badge{font-size:9px;padding:2px 7px;border-radius:3px;white-space:nowrap}
.goal-badge.on{background:#1a2e1e;color:var(--green-lt)}
.goal-badge.off{background:var(--red-dk);color:var(--red)}
.sync-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sync-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
.sync-card:active,.sync-card.open{border-color:var(--green)}
.sync-tag{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.sync-name{font-size:11px;color:var(--green-lt);font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sync-desc{font-size:10px;color:var(--muted);margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sync-date{font-size:10px;color:var(--dim);margin-bottom:4px}
.sync-amt{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.sync-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);grid-column:1/-1}
.sync-detail.on{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.sync-detail-row{font-size:10px;padding:3px 0}
.sync-detail-label{color:var(--faint)}
.sync-detail-val{color:var(--muted);margin-top:1px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:12px;color:var(--faint);font-size:12px;letter-spacing:.1em}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:380px){.sync-grid{grid-template-columns:1fr}}
</style>
</head>

<script>
const fmt=v=>'£'+Math.abs(v).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtF=v=>(v<0?'−':'')+'£'+Math.abs(v).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtD=iso=>{if(!iso||iso==='undefined'||iso==='')return '';try{return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return iso;}};
let chart=null;
const gtip=document.getElementById('gtip');
function showTip(btn,txt){
  gtip.textContent=txt;gtip.classList.add('on');
  requestAnimationFrame(()=>{
    const r=btn.getBoundingClientRect(),th=gtip.offsetHeight,tw=gtip.offsetWidth;
    let left=r.left+r.width/2-tw/2;
    left=Math.max(8,Math.min(left,window.innerWidth-tw-8));
    let top=r.top-th-6;if(top<8)top=r.bottom+6;
    gtip.style.left=left+'px';gtip.style.top=top+'px';
  });
}
function hideTip(){gtip.classList.remove('on');}
document.addEventListener('click',e=>{if(!e.target.classList.contains('info-btn'))hideTip();});
function ib(txt){const s=txt.replace(/'/g,"\\'").replace(/"/g,'&quot;');return '<button class="info-btn" onclick="event.stopPropagation();showTip(this,\''+s+'\')">i</button>';}
function switchTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  document.getElementById('btn-'+tab).classList.add('active');
  hideTip();if(chart)chart.resize();
}
function fmtDate(iso){if(!iso||iso==='undefined'||iso==='')return '—';try{return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return iso;}}

// Expandable sync cards
function toggleCard(id){
  const detail=document.getElementById(id);
  const card=detail.closest('.sync-expand');
  const isOpen=detail.classList.contains('on');
  detail.classList.toggle('on',!isOpen);
  card.classList.toggle('open',!isOpen);
}

function renderOverview(d){
  const rev=d.revenue;
  const now=new Date(),curM=now.getMonth();
  const mn=now.toLocaleString('en-GB',{month:'short'});
  const ytd25sp=rev.monthly2025.slice(0,curM+1).reduce((s,m)=>s+(m.value||0),0);
  const prog=Math.min(Math.round((rev.ytd2026/160000)*100),100);
  const gpm=rev.ytd2026>0?((d.grossProfit.ytd2026/rev.ytd2026)*100).toFixed(1):'0.0';
  const gpm25=ytd25sp>0?((d.grossProfit.ytd2025/rev.ytd2025)*100).toFixed(1):'0.0';
  const npPos=d.netProfit.ytd2026>=0;
  const domP=rev.ytd2026>0?((d.domestic.ytd/rev.ytd2026)*100).toFixed(1):'0';
  const comP=rev.ytd2026>0?((d.commercial.ytd/rev.ytd2026)*100).toFixed(1):'0';
  const inv=d.lastInvoice, exp=d.lastExpense;
  document.getElementById('overview-content').innerHTML=`
    <div class="slabel">Year to date — 2026</div>
    <div class="mcols">
      <div class="metric">
        <div class="mlabel">Total Revenue ${ib('All money received from clients for jobs and services completed')}</div>
        <div class="mval">${fmt(rev.ytd2026)}</div>
        <div class="prog"><div class="prog-fill" style="width:${prog}%"></div></div>
        <div class="msub">${prog}% of £160k annual target</div>
        <div class="mprev">Jan–${mn} 2025: <strong>${fmt(ytd25sp)}</strong></div>
      </div>
      <div class="metric">
        <div class="mlabel">Gross Profit ${ib('Revenue minus direct costs of doing the work, before overheads like vehicles and insurance')}</div>
        <div class="mval pos">${fmtF(d.grossProfit.ytd2026)}</div>
        <div class="badge up">${gpm}% margin</div>
        <div class="mprev">Jan–${mn} 2025: <strong>${fmtF(d.grossProfit.ytd2025)}</strong> &middot; ${gpm25}% margin</div>
      </div>
      <div class="metric">
        <div class="mlabel">Net Profit ${ib('What the business keeps after paying ALL costs — the bottom line')}</div>
        <div class="mval ${npPos?'pos':'neg'}">${fmtF(d.netProfit.ytd2026)}</div>
        <div class="badge ${npPos?'up':'dn'}">${npPos?'profit':'loss'}</div>
        <div class="mprev">Jan–${mn} 2025: <strong>${fmtF(d.netProfit.ytd2025)}</strong></div>
      </div>
    </div>
    <div class="card">

        <div class="legend-item"><div class="ldot" style="background:#1a3d2b"></div>Com 2026</div>

      <div class="chart-wrap"><canvas id="revChart"></canvas></div>
    </div>
    <div class="card">
      <div class="slabel">Revenue split YTD</div>
      <div class="split">

        <div class="split-item"><div class="split-label">Commercial</div><div class="split-val">${fmt(d.commercial.ytd)}</div><div class="split-sub">${comP}% of total</div></div>

    <div class="sync-grid">
      <div class="sync-card sync-expand open" onclick="toggleCard('inv-detail')">

  const comData=(rev.monthlyCom||[]).map(m=>m.value||0);

    type:'bar',

function renderExpenses(d){
  const exp=d.expenses;
  const colors=['#3d6b44','#1a3d2b','#2a5c38','#4a8a54','#5aa060','#6b8f70','#2a3a2e','#1e2e22','#3a5040','#4a6050'];
  // Sort breakdown by value descending
  const sorted=[...exp.breakdown].sort((a,b)=>b.value-a.value);
  document.getElementById('expenses-content').innerHTML=`
    <div class="slabel">Where the money goes</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="metric"><div class="mlabel">Total Expenses ${ib('Everything the business spends — direct costs plus overheads')}</div><div class="mval neg">${fmt(exp.total)}</div><div class="msub">YTD 2026</div></div>
      <div class="metric"><div class="mlabel">Cost of Sales ${ib('Costs directly tied to completing jobs — labour, materials, VAT')}</div><div class="mval">${fmt(exp.costOfSales)}</div><div class="msub">${exp.total>0?((exp.costOfSales/exp.total)*100).toFixed(0):0}% of spend</div></div>
    </div>
    <div class="card">
      <div class="slabel">Breakdown by type</div>
      <div style="position:relative;width:100%;max-width:260px;margin:0 auto 16px"><canvas id="pieChart"></canvas></div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${sorted.map((e,i)=>`
          <div style="display:flex;align-items:center;gap:8px;font-size:11px">
            <div style="width:10px;height:10px;border-radius:2px;flex-shrink:0;background:${colors[i%10]}"></div>
            <span style="flex:1;color:var(--muted)">${e.label} ${ib(e.info)}</span>
            <span style="color:var(--dim);min-width:54px;text-align:right">${fmt(e.value)}</span>
            <span style="color:var(--text);font-weight:500;min-width:34px;text-align:right">${e.pct}%</span>
          </div>`).join('')}
      </div>
    </div>`;
  const nonZero=sorted.filter(e=>e.value>0);
  if(nonZero.length>0){
    new Chart(document.getElementById('pieChart'),{
      type:'doughnut',
      data:{
        labels:nonZero.map(e=>e.label),
        datasets:[{data:nonZero.map(e=>e.value),backgroundColor:colors.slice(0,nonZero.length),borderColor:'#0f1110',borderWidth:2,hoverOffset:6}]
      },
      options:{
        responsive:true,maintainAspectRatio:true,cutout:'58%',
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+fmt(ctx.parsed)+' ('+((ctx.parsed/exp.total)*100).toFixed(1)+'%)'}}
        }
      }
    });
  }
}

function renderGoals(d){
  const now=new Date();
  const dayOfYear=Math.floor((now-new Date(now.getFullYear(),0,0))/(1000*60*60*24));
  const daysInYear=365;
  const expectedRev=Math.round((dayOfYear/daysInYear)*160000);
  const actualRev=d.revenue.ytd2026;
  const revDiff=actualRev-expectedRev;
  const onTarget=revDiff>=0;
  const prog=Math.min(Math.round((actualRev/160000)*100),100);

  const goals=d.goals.length?d.goals:['Reduce debt down to zero','Achieve tax profitability','Reduce broken machine % to 0%','Achieve revenue forecast of £160,000'];

  function goalStatus(g, idx){
    // Goal 4 = revenue target — we can give precise tracking
    const isRevGoal = g.toLowerCase().includes('160') || g.toLowerCase().includes('revenue');
    if(isRevGoal){
      const badge=`<span class="goal-badge ${onTarget?'on':'off'}">${onTarget?'On target ↑':'Behind ↓'}</span>`;
      const detail=`<span style="font-size:10px;color:var(--dim)">${onTarget?'£'+Math.abs(revDiff).toLocaleString('en-GB')+' ahead':'£'+Math.abs(revDiff).toLocaleString('en-GB')+' behind expected'} (expected ${fmt(expectedRev)} by today)</span>`;
      return `${badge}${detail}`;
    }
    return '';
  }

  document.getElementById('goals-content').innerHTML=`
    <div class="slabel">2026 Annual Goals</div>
    <div class="goals-list">
      ${goals.map((g,i)=>{
        const txt=g.replace(/^\d+\.\s*/,'');
        const status=goalStatus(txt,i);
        return `<div class="goal">
          <div class="goal-top"><div class="goal-n">${i+1}</div><div class="goal-text">${txt}</div></div>
          ${status?`<div class="goal-status">${status}</div>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:16px">
      <div class="slabel">Revenue Goal Progress</div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;color:var(--muted)">£160,000 target</span>
          <span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--green-lt)">${fmt(actualRev)}</span>
        </div>
        <div style="position:relative;background:#1e2420;border-radius:3px;height:6px;margin-bottom:8px">
          <div style="background:var(--green);height:6px;border-radius:3px;width:${prog}%;transition:width .6s"></div>
          <!-- Expected marker -->
          <div style="position:absolute;top:-3px;left:${Math.min((expectedRev/160000)*100,100)}%;width:2px;height:12px;background:var(--faint);border-radius:1px;transform:translateX(-50%)"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dim)">
          <span>${prog}% achieved</span>
          <span style="color:var(--faint)">▾ expected ${Math.round((expectedRev/160000)*100)}%</span>
        </div>
        <div style="font-size:10px;margin-top:6px;color:${onTarget?'var(--green-lt)':'var(--red)'}">
          ${onTarget?'↑ £'+Math.abs(revDiff).toLocaleString('en-GB')+' ahead of schedule':'↓ £'+Math.abs(revDiff).toLocaleString('en-GB')+' behind schedule'}
        </div>
      </div>
    </div>`;
}

async function loadData(silent){
  if(!silent)document.getElementById('live-dot').style.background='#4a5e50';
  try{
    const res=await fetch('/.netlify/functions/dashboard-data');
    const d=await res.json();
    if(d.error)throw new Error(d.error);
    renderOverview(d);renderExpenses(d);renderGoals(d);
    document.getElementById('hdr-time').textContent=new Date(d.updatedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('live-dot').style.background='#5a9e68';
  }catch(e){
    document.getElementById('overview-content').innerHTML='<div class="loading" style="color:var(--red)">Error: '+e.message+'</div>';
    document.getElementById('live-dot').style.background='#c05c4a';
  }
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
document.getElementById('hdr-time').textContent=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
loadData();
setInterval(()=>loadData(true),3600000);
